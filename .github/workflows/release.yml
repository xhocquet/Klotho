name: Release Addon Package

permissions:
  contents: write
  
on:
  push:
    tags:
      - 'v*'           # Triggered on tag push in v1.0.0 format
  workflow_dispatch:   # Can also be run manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit hash & tag
        id: meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build addon zip
        run: |
          mkdir -p dist

          # Include only the addons/ folder (exclude unnecessary files)
          zip -r dist/Klotho-Godot-addons-${{ steps.meta.outputs.sha }}.zip \
            addons/ \
            --exclude "*.import" \
            --exclude "*/.DS_Store" \
            --exclude "*/Thumbs.db"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: |
            ## Klotho ${{ steps.meta.outputs.tag }}

            ### Installation
            1. Download the zip and extract it
            2. Copy the `addons/` folder to your project root
            3. Go to Project → Project Settings → Plugins → Enable Klotho
          files: dist/Klotho-Godot-addons-${{ steps.meta.outputs.sha }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}